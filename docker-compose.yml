services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=elearn_db
      - DB_USER=elearn_user
      - DB_PASSWORD=elearn_password

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8000/health_check/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  db:
    image: postgres:17-alpine
    platform: linux/amd64

    environment:
      POSTGRES_DB: elearn_db
      POSTGRES_USER: elearn_user
      POSTGRES_PASSWORD: elearn_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elearn_user -d elearn_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
