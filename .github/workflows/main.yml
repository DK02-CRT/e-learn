name: CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with: 
          python-version: "3.10"

      - name : Installing dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
          pip install black

      - name: Run flake8
        run: |
          flake8 . --exclude=venv, __pychache__, migrations --max_line-length=120

      - name: Run black
        run: |
          black . --exclude=venv, __pychache__, migrations --max_line-length=120

      - name: Running tests
        run: python manage.py test

      - name: Run migrations
        run: python manage.py migrate