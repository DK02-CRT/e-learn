{% load static %}

<!DOCTYPE html>
<html lang="pl">
  <head>
    <title>E-learn</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{% static 'e_learn/style.css' %}">
  </head>
  <body>
    <header>
      <div class="login">
        <a href="{% url 'home' %}">Home</a>
      </div>
      <h2><p>Portal e-learningowy</p></h2>
      <div class="login"></div>
    </header>
    <main>
      <div class="log_con">
        <h1>Zaloguj się</h1>
        <form action="" method="post">
        {% csrf_token %}
          <label for="login">Nazwa użytkownika:</label>
          <input type="text" name="username">
          <br>
          <label for="password">Hasło:</label>
          <input type="password" name="password">
          <br>
          <input type="submit" value="Zaloguj się">
        </form>
        {% if error %}
        <p>{{ error }}</p>
        {% endif %}</div>
    </main>
    <footer>
        <p>Strona wykonana przez - Dawid Kasperczyk</p>
    </footer>
  </body>
</html>
