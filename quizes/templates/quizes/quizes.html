{% load static %}

<!DOCTYPE html>
<html lang="pl">
  <head>
    <!-- <title>E-learn</title> -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{% static 'quizes/style.css' %}">
  </head>
  <body>
    <header>
      <div class="jump">
        <a href="{% url 'home' %}" title="Wróć na stronę główną">
          <img src="{% static 'quizes/home.png' %}" alt="Strona główna">
        </a>
        </div>
      <h2><p>Portal e-learningowy</p></h2>
      <div class="login">
        <a href="{% url 'account' %}" title="Twoje konto">
          <img src="{{user.avatar.url}}" alt="{{user.name}}">
        </a>
      </div>
    </header>
    <main>
        <h1>Quizy</h1>
        {%for quiz in quizes%}
        <div class="task">
            <a href="{% url 'quiz_detail' quiz.pk %}">{{quiz.title}}</a>
            </div>
        {% empty %}
            <p>BŁĄD - nie znaleziono quizów</p>
        {% endfor %}
    </main>
    <footer>
        <p>Strona wykonana przez - Dawid Kasperczyk</p>
    </footer>
  </body>
</html>
